<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0f1923;
    --paper: #f7f4ef;
    --accent: #1a5c3a;
    --accent-light: #e8f3ed;
    --muted: #6b7280;
    --line: #e2ddd6;
    --white: #ffffff;
    --danger: #c0392b;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--white);
    padding: 28px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  header .logo-icon {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  header p {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    margin-top: 3px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* MAIN LAYOUT */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 60px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    align-items: start;
  }

  @media (max-width: 640px) {
    .container { grid-template-columns: 1fr; gap: 20px; }
    header { padding: 20px; }
    header h1 { font-size: 1.25rem; }
  }

  /* CARD */
  .card {
    background: var(--white);
    border-radius: 16px;
    padding: 28px;
    border: 1px solid var(--line);
    box-shadow: 0 2px 12px rgba(15,25,35,0.06);
  }

  .card-title {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  /* FORM */
  .field { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .input-wrap {
    position: relative;
  }

  .input-prefix {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.85rem;
    color: var(--muted);
    pointer-events: none;
    font-weight: 500;
  }

  input[type="number"], select {
    width: 100%;
    padding: 11px 14px 11px 32px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    font-size: 0.95rem;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    background: var(--paper);
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
    appearance: textfield;
  }

  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus, select:focus {
    border-color: var(--accent);
    background: var(--white);
  }

  select { padding-left: 14px; cursor: pointer; }

  /* SLIDER */
  .slider-wrap { margin-top: 6px; }

  input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 99px;
    background: var(--line);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    background: var(--accent);
    border-radius: 50%;
    border: 3px solid var(--white);
    box-shadow: 0 0 0 1.5px var(--accent);
    cursor: pointer;
  }

  .range-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 4px;
  }

  /* BUTTON */
  button {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: var(--white);
    border: none;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  button:hover { background: #155230; }
  button:active { transform: scale(0.98); }

  /* RESULTS */
  .emi-hero {
    text-align: center;
    padding: 20px 0 24px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 20px;
  }

  .emi-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .emi-amount {
    font-family: 'DM Serif Display', serif;
    font-size: 2.8rem;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -0.03em;
  }

  .emi-sub {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 5px;
  }

  /* BREAKDOWN ROWS */
  .breakdown { display: flex; flex-direction: column; gap: 14px; }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .row-label {
    font-size: 0.82rem;
    color: var(--muted);
  }

  .row-value {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--ink);
  }

  .row-value.red { color: var(--danger); }
  .row-value.green { color: var(--accent); }

  .divider { height: 1px; background: var(--line); }

  /* PIE CHART */
  .chart-wrap {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
  }

  .chart-title {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .donut-row {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  canvas#donut { flex-shrink: 0; }

  .legend { display: flex; flex-direction: column; gap: 10px; }

  .legend-item { display: flex; align-items: center; gap: 8px; }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-text { font-size: 0.78rem; color: var(--muted); line-height: 1.3; }
  .legend-text strong { display: block; color: var(--ink); font-size: 0.82rem; }

  /* AMORTIZATION TABLE */
  .table-wrap {
    grid-column: 1 / -1;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }

  thead tr { background: var(--ink); color: var(--white); }

  th {
    padding: 12px 14px;
    font-weight: 500;
    text-align: right;
    letter-spacing: 0.03em;
    font-size: 0.75rem;
  }

  th:first-child { text-align: left; border-radius: 8px 0 0 0; }
  th:last-child { border-radius: 0 8px 0 0; }

  td {
    padding: 10px 14px;
    text-align: right;
    border-bottom: 1px solid var(--line);
    color: var(--ink);
  }

  td:first-child { text-align: left; color: var(--muted); font-weight: 500; }
  tbody tr:hover { background: var(--accent-light); }
  tbody tr:last-child td { border-bottom: none; font-weight: 600; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.6;
  }
  .empty-icon { font-size: 2rem; margin-bottom: 10px; }

  /* SCROLL */
  .table-scroll { max-height: 320px; overflow-y: auto; }
  .table-scroll::-webkit-scrollbar { width: 4px; }
  .table-scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }
</style>
</head>
<body>

<header>
  <div class="logo-icon">₹</div>
  <div>
    <h1>Loan Calculator</h1>
    <p>EMI · Interest · Amortization</p>
  </div>
</header>

<div class="container">

  <!-- INPUT CARD -->
  <div class="card">
    <div class="card-title">Loan Details</div>

    <div class="field">
      <label>Loan Amount</label>
      <div class="input-wrap">
        <span class="input-prefix">₹</span>
        <input type="number" id="principal" value="500000" min="1000" max="100000000" step="1000">
      </div>
      <div class="slider-wrap">
        <input type="range" id="principalRange" min="10000" max="10000000" step="10000" value="500000">
        <div class="range-labels"><span>₹10K</span><span>₹1Cr</span></div>
      </div>
    </div>

    <div class="field">
      <label>Annual Interest Rate (%)</label>
      <div class="input-wrap">
        <span class="input-prefix">%</span>
        <input type="number" id="rate" value="8.5" min="0.1" max="36" step="0.1">
      </div>
      <div class="slider-wrap">
        <input type="range" id="rateRange" min="1" max="30" step="0.1" value="8.5">
        <div class="range-labels"><span>1%</span><span>30%</span></div>
      </div>
    </div>

    <div class="field">
      <label>Loan Tenure</label>
      <div class="input-wrap" style="display:flex; gap:8px;">
        <div style="position:relative;flex:1;">
          <input type="number" id="tenure" value="5" min="1" max="30" step="1" style="padding-left:14px;">
        </div>
        <select id="tenureType" style="width:110px;flex-shrink:0;">
          <option value="years">Years</option>
          <option value="months">Months</option>
        </select>
      </div>
      <div class="slider-wrap">
        <input type="range" id="tenureRange" min="1" max="30" step="1" value="5">
        <div class="range-labels"><span>1 Yr</span><span>30 Yrs</span></div>
      </div>
    </div>

    <button onclick="calculate()">Calculate EMI →</button>
  </div>

  <!-- RESULT CARD -->
  <div class="card" id="resultCard">
    <div class="empty">
      <div class="empty-icon">🧮</div>
      Enter your loan details and click<br><strong>Calculate EMI</strong> to see results
    </div>
  </div>

  <!-- AMORTIZATION TABLE -->
  <div class="card table-wrap" id="tableCard" style="display:none;">
    <div class="card-title">Yearly Amortization Schedule</div>
    <div class="table-scroll">
      <table id="amorTable">
        <thead>
          <tr>
            <th>Year</th>
            <th>Opening Balance</th>
            <th>Principal Paid</th>
            <th>Interest Paid</th>
            <th>Closing Balance</th>
          </tr>
        </thead>
        <tbody id="amorBody"></tbody>
      </table>
    </div>
  </div>

</div>

<footer style="text-align:center;padding:24px;font-size:0.75rem;color:#9ca3af;">
  © 2025 Loan Calculator &nbsp;·&nbsp; <a href="/privacy-policy.html" style="color:#1a5c3a;">Privacy Policy</a>
</footer>

<canvas id="donut" style="display:none;"></canvas>

<script>
  // Sync sliders with inputs
  const syncPairs = [
    ['principal','principalRange'],
    ['rate','rateRange'],
    ['tenure','tenureRange']
  ];

  syncPairs.forEach(([inputId, rangeId]) => {
    const input = document.getElementById(inputId);
    const range = document.getElementById(rangeId);
    input.addEventListener('input', () => { range.value = input.value; });
    range.addEventListener('input', () => { input.value = range.value; });
  });

  document.getElementById('tenureType').addEventListener('change', () => {
    const type = document.getElementById('tenureType').value;
    const range = document.getElementById('tenureRange');
    if (type === 'months') {
      range.min = 1; range.max = 360; range.step = 1;
      document.querySelector('#tenureRange + .range-labels').innerHTML = '<span>1 Mo</span><span>360 Mo</span>';
    } else {
      range.min = 1; range.max = 30; range.step = 1;
      document.querySelector('#tenureRange + .range-labels').innerHTML = '<span>1 Yr</span><span>30 Yrs</span>';
    }
    range.value = document.getElementById('tenure').value;
  });

  function fmt(n) {
    return '₹' + Math.round(n).toLocaleString('en-IN');
  }

  function calculate() {
    const P = parseFloat(document.getElementById('principal').value);
    const annualRate = parseFloat(document.getElementById('rate').value);
    const tenureVal = parseFloat(document.getElementById('tenure').value);
    const tenureType = document.getElementById('tenureType').value;

    if (!P || !annualRate || !tenureVal) return;

    const n = tenureType === 'years' ? tenureVal * 12 : tenureVal;
    const r = annualRate / 12 / 100;

    const EMI = r === 0
      ? P / n
      : (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);

    const totalPayment = EMI * n;
    const totalInterest = totalPayment - P;

    // Update result card
    const rc = document.getElementById('resultCard');
    const principalPct = Math.round((P / totalPayment) * 100);
    const interestPct = 100 - principalPct;

    rc.innerHTML = `
      <div class="card-title">Summary</div>
      <div class="emi-hero">
        <div class="emi-label">Monthly EMI</div>
        <div class="emi-amount">${fmt(EMI)}</div>
        <div class="emi-sub">for ${tenureType === 'years' ? tenureVal + ' years (' + n + ' months)' : n + ' months'} at ${annualRate}% p.a.</div>
      </div>
      <div class="breakdown">
        <div class="row">
          <span class="row-label">Loan Principal</span>
          <span class="row-value green">${fmt(P)}</span>
        </div>
        <div class="row">
          <span class="row-label">Total Interest</span>
          <span class="row-value red">${fmt(totalInterest)}</span>
        </div>
        <div class="divider"></div>
        <div class="row">
          <span class="row-label">Total Payment</span>
          <span class="row-value">${fmt(totalPayment)}</span>
        </div>
      </div>
      <div class="chart-wrap">
        <div class="chart-title">Breakdown</div>
        <div class="donut-row">
          <canvas id="donutCanvas" width="90" height="90"></canvas>
          <div class="legend">
            <div class="legend-item">
              <div class="legend-dot" style="background:#1a5c3a;"></div>
              <div class="legend-text"><strong>${fmt(P)}</strong>Principal (${principalPct}%)</div>
            </div>
            <div class="legend-item">
              <div class="legend-dot" style="background:#c0392b;"></div>
              <div class="legend-text"><strong>${fmt(totalInterest)}</strong>Interest (${interestPct}%)</div>
            </div>
          </div>
        </div>
      </div>
    `;

    // Draw donut
    setTimeout(() => {
      const canvas = document.getElementById('donutCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const cx = 45, cy = 45, r = 38, lineW = 14;
      const pAngle = (P / totalPayment) * 2 * Math.PI;

      ctx.clearRect(0, 0, 90, 90);

      ctx.beginPath();
      ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + pAngle);
      ctx.strokeStyle = '#1a5c3a';
      ctx.lineWidth = lineW;
      ctx.lineCap = 'round';
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(cx, cy, r, -Math.PI/2 + pAngle, -Math.PI/2 + 2*Math.PI);
      ctx.strokeStyle = '#c0392b';
      ctx.lineWidth = lineW;
      ctx.lineCap = 'round';
      ctx.stroke();
    }, 50);

    // Build yearly amortization
    let balance = P;
    const tbody = document.getElementById('amorBody');
    tbody.innerHTML = '';
    let totalYearlyPrincipal = 0, totalYearlyInterest = 0;

    const yearsCount = Math.ceil(n / 12);
    for (let y = 1; y <= yearsCount; y++) {
      const monthsInYear = Math.min(12, n - (y - 1) * 12);
      let yearPrincipal = 0, yearInterest = 0;
      const openingBalance = balance;

      for (let m = 0; m < monthsInYear; m++) {
        const interest = balance * r;
        const principal = Math.min(EMI - interest, balance);
        yearInterest += interest;
        yearPrincipal += principal;
        balance -= principal;
        if (balance < 0.01) balance = 0;
      }

      totalYearlyPrincipal += yearPrincipal;
      totalYearlyInterest += yearInterest;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>Year ${y}</td>
        <td>${fmt(openingBalance)}</td>
        <td>${fmt(yearPrincipal)}</td>
        <td>${fmt(yearInterest)}</td>
        <td>${fmt(Math.max(0, balance))}</td>
      `;
      tbody.appendChild(tr);
    }

    // Total row
    const totalRow = document.createElement('tr');
    totalRow.style.background = '#e8f3ed';
    totalRow.innerHTML = `
      <td>Total</td>
      <td>—</td>
      <td>${fmt(totalYearlyPrincipal)}</td>
      <td>${fmt(totalYearlyInterest)}</td>
      <td>₹0</td>
    `;
    tbody.appendChild(totalRow);

    document.getElementById('tableCard').style.display = 'block';
    document.getElementById('tableCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Auto-calculate on load
  calculate();
</script>
</body>
</html>
